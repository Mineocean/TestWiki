<!DOCTYPE html>
<html class="staticrypt-html">
<head>
    <meta charset="utf-8" />
    <title>机密文档 | Sage</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="cache-control" content="max-age=0" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
    <meta http-equiv="pragma" content="no-cache" />

    <style>
        :root {
            --color-bg: #fff; --color-fg: #171717; --color-muted: #737373;
            --color-border: #e5e5e5; --color-accent: #7c3aed;
            --color-surface: #fafafa;
        }
        [data-theme="dark"] {
            --color-bg: #0d0d0d; --color-fg: #ededed; --color-muted: #888;
            --color-border: #2a2a2a; --color-accent: #a78bfa;
            --color-surface: #171717;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--color-bg); color: var(--color-fg);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .staticrypt-page {
            width: 380px; max-width: 90vw; padding: 2rem 1rem;
            box-sizing: border-box; text-align: center;
        }
        .logo {
            display: inline-flex; align-items: center; justify-content: center;
            width: 3rem; height: 3rem; border-radius: 0.75rem;
            background: var(--color-accent); color: #fff;
            font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem;
        }
        .staticrypt-form {
            background: var(--color-bg); border: 1px solid var(--color-border);
            border-radius: 0.85rem; padding: 2rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            text-align: center;
        }
        .staticrypt-instructions { color: var(--color-muted); font-size: 0.9rem; margin-bottom: 1.25rem; }
        .staticrypt-password-container { position: relative; width: 100%; margin: 0 0 0.75rem; }
        .staticrypt-form input[type="password"] {
            width: 100%; border: 1px solid var(--color-border); border-radius: 0.65rem;
            background: var(--color-surface); color: var(--color-fg); font-size: 0.95rem;
            padding: 0.75rem 1rem; font-family: inherit; outline: none; transition: border-color 0.15s;
        }
        .staticrypt-form input[type="password"]:focus { border-color: var(--color-accent); }
        .staticrypt-form input[type="password"]::placeholder { color: var(--color-muted); }
        .staticrypt-decrypt-button {
            width: 100%; border: none; border-radius: 0.65rem;
            background: var(--color-accent); color: #fff;
            font-size: 0.9rem; font-weight: 600; padding: 0.75rem;
            cursor: pointer; font-family: inherit; transition: opacity 0.15s;
            text-transform: none; letter-spacing: 0;
        }
        .staticrypt-decrypt-button:hover { opacity: 0.9; }
        .staticrypt-error { color: #ef4444; font-size: 0.85rem; margin-top: 0.75rem; min-height: 1.25em; }

        .theme-btn {
            position: fixed; bottom: 1.5rem; right: 1.5rem;
            width: 2.5rem; height: 2.5rem; border-radius: 0.75rem;
            border: 1px solid var(--color-border); background: var(--color-bg);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: var(--color-muted); box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            font-size: 1rem; transition: background 0.15s;
        }
        .theme-btn:hover { background: var(--color-surface); }
    </style>
</head>
<body>
    <div class="staticrypt-page">
        <div class="logo">S</div>
        <div class="staticrypt-form">
            <p class="staticrypt-instructions">此文档受密码保护</p>
            <div class="staticrypt-password-container">
                <input type="password" id="staticrypt-password" placeholder="输入密码" autofocus />
            </div>
            <input type="submit" class="staticrypt-decrypt-button" value="解密" />
            <div class="staticrypt-error" id="staticrypt-error"></div>
        </div>
    </div>

    <button class="theme-btn" id="theme-btn" title="切换主题">☀</button>

    <script>
        const staticryptInitiator = /*[|js_staticrypt|]*/ 0;
        const templateError = "密码错误，请重试",
              templateToggleAltShow = "显示密码",
              templateToggleAltHide = "隐藏密码",
              isRememberEnabled = /*[|is_remember_enabled|]*/ 0,
              staticryptConfig = /*[|staticrypt_config|]*/ 0;
    </script>

    <script>
        (function() {
            const saved = localStorage.getItem('theme');
            const prefers = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            const theme = saved || prefers;
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('theme-btn').textContent = theme === 'dark' ? '☾' : '☀';
        })();
        document.getElementById('theme-btn').addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('theme-btn').textContent = next === 'dark' ? '☾' : '☀';
        });
    </script>
</body>
</html>
